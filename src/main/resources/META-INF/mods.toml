modLoader = "javafml"
loaderVersion = "[47,)"
license = "${mod_license}"
issueTrackerURL = "https://github.com/smokahs/GTSF/issues"

[[mods]]
    modId = "${mod_id}"
    version = "${version}"
    displayName = "${mod_name}"
    displayURL = "${mod_url}"
    logoFile = "icon.png"
    authors = "${mod_author}"
    credits = "Built on GregTech CEu: Modern by KilaBash, screret, serenibyss and the wider GregTech contributor lineage."
    description = '''
GregTech: Star Foundry, a standalone GregTech CEu Modern addon.
Adds the primordial endgame toolset and the tool sound rework.
'''

    [[dependencies.${mod_id}]]
        modId = "forge"
        mandatory = true
        versionRange = "[${forge_version},)"
        ordering = "NONE"
        side = "BOTH"
    [[dependencies.${mod_id}]]
        modId = "minecraft"
        mandatory = true
        versionRange = "[${minecraft_version},)"
        ordering = "NONE"
        side = "BOTH"
    [[dependencies.${mod_id}]]
        modId = "gtceu"
        mandatory = true
        versionRange = "[7.5.3,8.1)"
        ordering = "AFTER"
        side = "BOTH"
